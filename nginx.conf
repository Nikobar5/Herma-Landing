server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent Nginx from including internal port (8080) in redirects
    absolute_redirect off;
    port_in_redirect off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Pre-rendered pages (blog posts, docs, etc.) have per-route index.html
    # with correct <title>, meta description, and OG tags.
    # try_files $uri/ serves these before falling back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html (so deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Sitemap and robots — no cache, always fresh
    location = /sitemap.xml {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/xml";
    }
    location = /robots.txt {
        add_header Cache-Control "no-cache";
    }
    location = /llms.txt {
        add_header Cache-Control "no-cache";
    }
}
